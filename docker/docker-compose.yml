version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: contractiq_postgres
    restart: always
    environment:
      POSTGRES_USER: contractiq_user
      POSTGRES_PASSWORD: contractiq_secure_password
      POSTGRES_DB: contractiq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - contractiq_network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: contractiq_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://contractiq_user:contractiq_secure_password@postgres:5432/contractiq_db
      - SECRET_KEY=41b7fcf7c73dbad95bf0a4980f77bc542459a933f81e3a98ea83ee66b4478335
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - UPLOAD_DIR=/app/uploads
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - contractiq_network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: contractiq_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - contractiq_network

volumes:
  postgres_data:
  backend_uploads:

networks:
  contractiq_network:
    driver: bridge
